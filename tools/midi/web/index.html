<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{TITLE}}</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="scanlines"></div>
  <div class="crt">
    <header class="topbar">
      <span class="title">▓▒░ {{TITLE}} ░▒▓</span>
      <label class="devsel">OUT&nbsp;»&nbsp;<select id="device"></select></label>
    </header>

    <main>
      <section class="panel viz">
        <div class="panel-title">EQUALIZER · 16 CH</div>
        <canvas id="eq"></canvas>
      </section>

      <aside class="panel playlist">
        <div class="panel-title">PLAYLIST</div>
        <ol id="list"></ol>
      </aside>
    </main>

    <footer class="panel nowplaying">
      <div class="np-line"><span class="lbl">TRACK </span><span id="np-name" class="amber">—</span></div>
      <div class="np-line"><span class="lbl">FOLDER</span><span id="np-folder">—</span></div>
      <div class="time">
        <span id="t-cur">0:00</span>
        <div class="seek"><div id="seek-fill"></div></div>
        <span id="t-dur">0:00</span>
      </div>
      <div class="transport">
        <button type="button" data-act="prev">⏮ PREV</button>
        <button type="button" data-act="play" class="go">▶ PLAY</button>
        <button type="button" data-act="pause">⏸ PAUSE</button>
        <button type="button" data-act="stop">■ STOP</button>
        <button type="button" data-act="next">NEXT ⏭</button>
        <button type="button" data-act="shuffle" class="toggle" id="btn-shuffle" title="Shuffle">SHUF</button>
        <button type="button" data-act="repeat" class="toggle" id="btn-repeat" title="Repeat playlist">LOOP</button>
      </div>
    </footer>
  </div>
  <script src="/app.js"></script>
</body>
</html>
