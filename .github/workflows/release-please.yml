name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Maintains a release PR (version bump + CHANGELOG) from conventional
      # commits, and cuts a GitHub release + tag when that PR is merged.
      # No npm publish: this is a private firmware/CLI repo, not an npm package.
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          release-type: node
