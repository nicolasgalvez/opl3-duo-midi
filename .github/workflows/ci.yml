name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      # The CLI's native deps (audify/RtAudio, easymidi/@julusian/midi) link
      # against ALSA, so `opl serve` (which the e2e boot) needs libasound present.
      - name: Install audio libs (ALSA + PulseAudio)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libpulse0

      # Root install also installs the tools/midi workspace (incl. native deps).
      - name: Install root + CLI deps
        run: npm ci

      - name: Install web-app deps
        working-directory: tools/midi/web-app
        run: npm ci

      - name: Typecheck (tsc, strict)
        working-directory: tools/midi
        run: npm run typecheck

      - name: Node unit tests
        working-directory: tools/midi
        run: npm run test:unit

      - name: Web-app unit tests (Vitest)
        working-directory: tools/midi/web-app
        run: npm test

      - name: Build web-app
        working-directory: tools/midi/web-app
        run: npm run build

      - name: Install Playwright (chromium)
        working-directory: tools/midi
        run: npx playwright install --with-deps chromium

      # Exclude the in-browser SoundFont synthesis tests: they assert real audio
      # output (AnalyserNode RMS), which CI runners have no audio backend for.
      - name: E2E (Playwright, deterministic)
        working-directory: tools/midi
        run: npx playwright test --grep-invert "synthesizes audio"

  # Full `opl render` pipeline (ODM-13): fluidsynth + the TimGM6mb GM soundfont
  # stand in for the OPL3 Duo hardware, and a loopback audio device stands in
  # for the board's analog capture — so the real MIDI -> synth -> capture ->
  # browser video -> mux chain runs the same way it does in production (Linux).
  # The former macOS leg was removed 2026-07-16 (ODM-24): no billing-safe way
  # to run it (hosted = 10x billing, disabled; proski is Intel Big Sur, below
  # the runner agent's macOS 13 floor). The real-hardware chain on proski is
  # the actual macOS coverage.
  render-e2e:
    name: render e2e (fluidsynth)
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      # All userspace: Azure 6.x runner kernels ship no sound modules at all
      # (no snd-aloop, no snd-seq), so both the audio loopback (Pulse null
      # sink) and the MIDI transport (opl's own UDP adapter -> fluidsynth's
      # TCP shell, via tests/fluidUdpBridge.ts) avoid the kernel entirely.
      - name: Audio loopback + fluidsynth (Linux, Pulse null sink)
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libasound2-plugins libpulse0 pulseaudio pulseaudio-utils fluidsynth ffmpeg
          pulseaudio -D --exit-idle-time=-1
          pactl load-module module-null-sink sink_name=oplsink
          pactl set-default-sink oplsink
          pactl set-default-source oplsink.monitor
          echo "OPL_FLUID_AUDIO_DRIVER=pulseaudio" >> "$GITHUB_ENV"
          echo "OPL_FLUID_MIDI=udp" >> "$GITHUB_ENV"

      - name: Install root + CLI deps
        run: npm ci

      - name: Install Playwright (chromium)
        working-directory: tools/midi
        run: npx playwright install --with-deps chromium

      - name: Full render pipeline e2e
        working-directory: tools/midi
        env:
          OPL_RENDER_E2E: '1'
          OPL_AUDIO_DEVICE: 'PulseAudio'
        run: npm run test:e2e:render
