name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      # The CLI's native deps (audify/RtAudio, easymidi/@julusian/midi) link
      # against ALSA, so `opl serve` (which the e2e boot) needs libasound present.
      - name: Install audio libs (ALSA + PulseAudio)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libpulse0

      # Root install also installs the tools/midi workspace (incl. native deps).
      - name: Install root + CLI deps
        run: npm ci

      - name: Install web-app deps
        working-directory: tools/midi/web-app
        run: npm ci

      - name: Typecheck (tsc, strict)
        working-directory: tools/midi
        run: npm run typecheck

      - name: Node unit tests
        working-directory: tools/midi
        run: npm run test:unit

      - name: Web-app unit tests (Vitest)
        working-directory: tools/midi/web-app
        run: npm test

      - name: Build web-app
        working-directory: tools/midi/web-app
        run: npm run build

      - name: Install Playwright (chromium)
        working-directory: tools/midi
        run: npx playwright install --with-deps chromium

      # Exclude the in-browser SoundFont synthesis tests: they assert real audio
      # output (AnalyserNode RMS), which CI runners have no audio backend for.
      - name: E2E (Playwright, deterministic)
        working-directory: tools/midi
        run: npx playwright test --grep-invert "synthesizes audio"

  # Full `opl render` pipeline (ODM-13): fluidsynth + the TimGM6mb GM soundfont
  # stand in for the OPL3 Duo hardware, and a loopback audio device stands in
  # for the board's analog capture — so the real MIDI -> synth -> capture ->
  # browser video -> mux chain runs on both Linux and macOS.
  render-e2e:
    name: render e2e (fluidsynth, ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            # snd-aloop: playback written to device 0 appears as capture on
            # device 1 — fluidsynth plays into ,0 and RtAudio records from ,1.
            audio-device: 'Loopback,1'
          - os: macos-latest
            audio-device: 'BlackHole 2ch'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Audio loopback + fluidsynth (Linux, ALSA snd-aloop)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libpulse0 fluidsynth ffmpeg "linux-modules-extra-$(uname -r)"
          # snd-aloop: the loopback card; snd-seq: the ALSA sequencer that
          # both RtMidi (easymidi) and fluidsynth's MIDI driver require.
          sudo modprobe snd-aloop snd-seq
          echo "OPL_FLUID_AUDIO_DEVICE=plughw:Loopback,0,0" >> "$GITHUB_ENV"
          cat /proc/asound/cards

      - name: Audio loopback + fluidsynth (macOS, BlackHole)
        if: runner.os == 'macOS'
        run: |
          brew install fluid-synth blackhole-2ch ffmpeg
          # BlackHole is a CoreAudio HAL plugin; coreaudiod must reload to see
          # it. fluidsynth then plays straight into it (audio.coreaudio.device)
          # — the system default output never changes.
          sudo killall coreaudiod || true
          sleep 3
          echo "OPL_FLUID_AUDIO_DEVICE=BlackHole 2ch" >> "$GITHUB_ENV"

      - name: Install root + CLI deps
        run: npm ci

      - name: Install Playwright (chromium)
        working-directory: tools/midi
        run: npx playwright install --with-deps chromium

      - name: Full render pipeline e2e
        working-directory: tools/midi
        env:
          OPL_RENDER_E2E: '1'
          OPL_AUDIO_DEVICE: ${{ matrix.audio-device }}
        run: npm run test:e2e:render
