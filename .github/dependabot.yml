version: 2
updates:
  # Root dev tooling (husky, eslint, prettier, lint-staged)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    # Wait a week after a version is published before PRing it -- gives time
    # for hijacked/malicious releases to be caught and yanked upstream.
    cooldown:
      default-days: 7

  # The opl CLI (easymidi, @tonejs/midi, audify, yargs, playwright)
  - package-ecosystem: npm
    directory: /tools/midi
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    cooldown:
      default-days: 7

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: chore
      include: scope
    cooldown:
      default-days: 7
